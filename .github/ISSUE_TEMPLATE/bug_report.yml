name: Bug Report
description: Report a bug in saro
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Command(s) to reproduce the issue
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: saro version
      description: Output of `saro --version` or commit SHA
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Architecture
      placeholder: e.g. Linux amd64, macOS arm64
    validations:
      required: true
  - type: input
    id: registry
    attributes:
      label: Registry type
      placeholder: e.g. Harbor 2.9, Zot, ghcr.io, Docker Hub
